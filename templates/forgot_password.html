<!DOCTYPE html>
<!--
    File: forgot_password.html
    Project: TimberOps
    Purpose:
    Displays the developer's contact information for users who have
    forgotten their password. Password resets must be completed by
    the developer.
-->

<html lang="en">

<head>

    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Makes the webpage responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Browser tab title -->
    <title>Forgot Password | TimberOps</title>

    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='forgot_password.css') }}">

    <!-- Internal CSS specific to this page -->
    <style>

        /* Centre the content on the page */
        body{
            margin:0;
            font-family:'Kameron', serif;
            background:#f4f4f4;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        /* Main information card */
        .contact-card{

            background:#ffffff;

            width:520px;
            max-width:90%;

            padding:45px;

            border-radius:12px;

            box-shadow:0px 8px 25px rgba(0,0,0,0.12);

            text-align:center;

        }

        /* Main heading */
        h1{

            color:#111827;
            margin-bottom:20px;

        }

        /* Paragraph styling */
        p{

            color:#4b5563;
            line-height:1.7;
            font-size:17px;

        }

        /* Contact details section */
        .contact-details{

            margin-top:35px;
            margin-bottom:35px;

        }

        .contact-details p{

            margin:12px 0;

        }

        /* Back button */
        .back-button{

            display:inline-block;

            padding:14px 28px;

            background:#606c38;

            color:white;

            text-decoration:none;

            border-radius:8px;

            transition:0.25s;

        }

        /* Hover effect */
        .back-button:hover{

            background:#374151;

        }

    </style>

</head>

<body>

    <!-- Main contact information container -->
    <div class="contact-card">

        <!-- Page heading -->
        <h1>Forgot Your Password?</h1>

        <!-- Explanation -->
        <p>

            Passwords cannot be reset through this webpage.

            <br><br>

            Please contact the TimberOps developer using the details below.

        </p>

        <!-- Developer contact information -->
        <div class="contact-details">

            <p><strong>Developer:</strong> Samarth Faldu</p>

            <p><strong>Phone:</strong> 0410457550</p>

            <p><strong>Email:</strong> samarthfaldu01@gmail.com</p>

        </div>

        <!-- Returns the user to the login page -->
        <a href="/admin/login" class="back-button">

            Back to Login

        </a>

    </div>

    <script>

        /*
            Basic validation

            Checks whether the developer information has been
            replaced with actual contact details instead of
            placeholder text.
        */

        const developerName = "YOUR NAME";
        const developerPhone = "YOUR PHONE NUMBER";
        const developerEmail = "YOUR EMAIL ADDRESS";

        if (
            developerName === "YOUR NAME" ||
            developerPhone === "YOUR PHONE NUMBER" ||
            developerEmail === "YOUR EMAIL ADDRESS"
        ) {

            console.warn(
                "Reminder: Replace the placeholder developer contact details before publishing."
            );

        }

    </script>

</body>

</html>
